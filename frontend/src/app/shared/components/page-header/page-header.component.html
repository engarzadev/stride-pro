<div class="page-header">
  <h1>{{ title }}</h1>
  <div class="header-actions">
    @if (secondButtonText) {
      <button class="btn btn-outline" (click)="secondButtonClick.emit()">
        {{ secondButtonText }}
      </button>
    }
    @if (buttonText) {
      <button class="btn btn-primary" (click)="buttonClick.emit()">
        + {{ buttonText }}
      </button>
    }
  </div>
</div>
