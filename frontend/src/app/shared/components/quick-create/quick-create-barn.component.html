@if (service.visible()) {
  <div class="modal-overlay" (click)="onCancel()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">New Barn</h3>
        <button type="button" class="modal-close" (click)="onCancel()">&times;</button>
      </div>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label" for="qb-name">Name *</label>
          <input id="qb-name" type="text" class="form-control" formControlName="name"
            [class.is-invalid]="form.controls.name.touched && form.controls.name.invalid">
          @if (form.controls.name.touched && form.controls.name.errors?.['required']) {
            <div class="form-error">Barn name is required.</div>
          }
        </div>
        <div class="form-group">
          <label class="form-label" for="qb-contactName">Contact Name</label>
          <input id="qb-contactName" type="text" class="form-control" formControlName="contactName">
        </div>
        <div class="form-group">
          <label class="form-label" for="qb-address">Address</label>
          <input id="qb-address" type="text" class="form-control" formControlName="address">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="qb-phone">Phone</label>
            <input id="qb-phone" type="text" class="form-control" formControlName="phone">
          </div>
          <div class="form-group">
            <label class="form-label" for="qb-email">Email</label>
            <input id="qb-email" type="email" class="form-control" formControlName="email"
              [class.is-invalid]="form.controls.email.touched && form.controls.email.invalid">
            @if (form.controls.email.touched && form.controls.email.errors?.['email']) {
              <div class="form-error">Please enter a valid email.</div>
            }
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="qb-notes">Notes</label>
          <textarea id="qb-notes" class="form-control" formControlName="notes" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            @if (saving()) { Saving... } @else { Create Barn }
          </button>
          <button type="button" class="btn btn-outline" (click)="onCancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
}
