@if (showLayout()) {
  <div class="app-layout">
    <app-sidebar [collapsed]="sidebarOpen()" (closeSidebar)="sidebarOpen.set(false)" />
    <div class="app-main">
      <app-header (toggleSidebar)="toggleSidebar()" />
      <main class="app-content">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <router-outlet />
}

<app-toast />
<app-confirm-dialog />
<app-quick-create-client />
<app-quick-create-barn />
<app-quick-create-horse />
<app-quick-create-appointment />
