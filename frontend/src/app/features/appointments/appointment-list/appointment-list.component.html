<app-page-header title="Appointments" buttonText="Add Appointment" (buttonClick)="onAdd()" />

@if (loading()) {
  <app-loading-spinner />
} @else {
  <div class="card">
    <app-data-table
      [columns]="columns"
      [data]="$any(tableAppointments())"
      [actions]="actions"
      (rowClick)="onRowClick($event)"
      (actionClick)="onAction($event)" />
  </div>
}
