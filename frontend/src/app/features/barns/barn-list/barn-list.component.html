<app-page-header
  title="Barns"
  [buttonText]="canManageBarns() ? 'Add Barn' : ''"
  (buttonClick)="onAdd()" />

@if (!canManageBarns()) {
  <div class="upgrade-notice">
    <mat-icon>lock</mat-icon>
    <span>Barn management requires a paid plan. Upgrade to create and manage barns.</span>
  </div>
}

@if (loading()) {
  <app-loading-spinner />
} @else {
  <mat-card>
    <mat-card-content>
      <app-data-table
        [columns]="columns"
        [data]="$any(barns())"
        [actions]="actions"
        [mobileCard]="mobileCard"
        (rowClick)="onRowClick($event)"
        (actionClick)="onAction($event)" />
    </mat-card-content>
  </mat-card>
}
