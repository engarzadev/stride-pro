<app-page-header title="Horses" buttonText="Add Horse" (buttonClick)="onAdd()" />

@if (loading()) {
  <app-loading-spinner />
} @else {
  <div class="card">
    <app-data-table
      [columns]="columns"
      [data]="$any(tableHorses())"
      [actions]="actions"
      (rowClick)="onRowClick($event)"
      (actionClick)="onAction($event)" />
  </div>
}
